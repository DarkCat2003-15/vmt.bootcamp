<mat-card class="game-card">
  <img mat-card-image [src]="product.thumbnail" [alt]="product.title" loading="lazy" />

  <mat-card-header>
    <mat-card-title>{{ product.title }}</mat-card-title>
    <mat-card-subtitle>{{ product.category }} | {{ product.rating }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <p>{{ product.description }}</p>
    <p class="price">
      @if (product.price === 0) {
        Gratis
      } @else {
        {{ product.price | currency: 'USD' : 'symbol' : '1.0-2' }}
      }
    </p>

    <mat-chip-set aria-label="Etiquetas del juego">
      @for (tag of product.tags; track tag) {
        <mat-chip>{{ tag }}</mat-chip>
      }
    </mat-chip-set>
  </mat-card-content>

  <mat-card-actions>
    <button mat-button color="primary" type="button" (click)="showDetail()">Ver detalle</button>
  </mat-card-actions>
</mat-card>
