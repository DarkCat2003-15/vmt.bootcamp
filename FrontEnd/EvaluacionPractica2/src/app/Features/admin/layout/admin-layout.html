<mat-sidenav-container class="admin-container">
  <mat-sidenav mode="side" opened class="admin-sidenav">
    <div class="sidenav-brand">
      <mat-icon>storefront</mat-icon>
      <span>{{ appName }}</span>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/dashboard/products" routerLinkActive="active-link">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>Productos</span>
      </a>
      <a mat-list-item routerLink="/dashboard/carts" routerLinkActive="active-link">
        <mat-icon matListItemIcon>shopping_cart</mat-icon>
        <span matListItemTitle>Carritos</span>
      </a>
      <a mat-list-item routerLink="/" target="_blank">
        <mat-icon matListItemIcon>public</mat-icon>
        <span matListItemTitle>Sitio publico</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="admin-topbar">
      <span class="topbar-title">Panel administrativo</span>
      <span class="toolbar-spacer"></span>

      @if (currentUser(); as user) {
        <div class="user-info">
          <img [src]="user.image" [alt]="user.firstName" />
          <span>{{ user.firstName }} {{ user.lastName }}</span>
        </div>
      }

      <button mat-stroked-button type="button" (click)="logout()">
        <mat-icon>logout</mat-icon>
        Cerrar sesion
      </button>
    </mat-toolbar>

    <main class="admin-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
