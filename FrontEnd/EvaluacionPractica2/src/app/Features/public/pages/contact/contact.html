<section class="page-header">
  <h1>Contact</h1>
  <p>Escríbenos, estamos para ayudarte</p>
</section>

<mat-card class="contact-card">
  <p><strong>Correo:</strong> contacto&#64;novamarket.com</p>
  <p><strong>Teléfono:</strong> +1 800 123 456</p>
  <p><strong>Horario:</strong> Lunes a Viernes 8:00 - 18:00</p>

  <form class="contact-form" (submit)="$event.preventDefault()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nombre</mat-label>
      <input matInput placeholder="Tu nombre" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Correo</mat-label>
      <input matInput type="email" placeholder="tu@correo.com" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Mensaje</mat-label>
      <textarea matInput rows="4" placeholder="Escribe tu mensaje"></textarea>
    </mat-form-field>

    <button mat-flat-button color="primary" type="submit">Enviar mensaje</button>
  </form>
</mat-card>
