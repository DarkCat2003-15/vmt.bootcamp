<h2 mat-dialog-title>{{ course ? 'Editar curso' : 'Nuevo curso' }}</h2>

<mat-dialog-content>
  @if (errorMessage()) {
    <p class="dialog-error">
      <mat-icon aria-hidden="true">error_outline</mat-icon>
      {{ errorMessage() }}
    </p>
  }

  <app-course-form
    [course]="course"
    [loading]="loading()"
    [submitLabel]="course ? 'Actualizar' : 'Crear'"
    (formSubmit)="save($event)"
    (formCancel)="close()"
  />
</mat-dialog-content>
