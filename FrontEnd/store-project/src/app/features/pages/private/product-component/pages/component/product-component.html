<div class="products-page">

    <div class="page-header">
        <div>
            <h1>Productos</h1>
            <p>Gestiona el catálogo de TiendaMía</p>
        </div>
        <button mat-flat-button color="primary" (click)="openCreate()">
            <mat-icon>add</mat-icon>
            Nuevo producto
        </button>
    </div>

    @if (loading()) {
    <div class="loading-center">
        <mat-spinner diameter="48" />
    </div>
    } @else {
    <div class="table-container">
        <table mat-table [dataSource]="products()" class="products-table">

            <ng-container matColumnDef="image">
                <th mat-header-cell *matHeaderCellDef>Imagen</th>
                <td mat-cell *matCellDef="let p">
                    <img [src]="p.image" [alt]="p.title" class="product-thumb" />
                </td>
            </ng-container>

            <ng-container matColumnDef="title">
                <th mat-header-cell *matHeaderCellDef>Título</th>
                <td mat-cell *matCellDef="let p">{{ p.title | slice:0:40 }}...</td>
            </ng-container>

            <ng-container matColumnDef="category">
                <th mat-header-cell *matHeaderCellDef>Categoría</th>
                <td mat-cell *matCellDef="let p">{{ p.category }}</td>
            </ng-container>

            <ng-container matColumnDef="price">
                <th mat-header-cell *matHeaderCellDef>Precio</th>
                <td mat-cell *matCellDef="let p" class="price">{{ p.price | currency:'USD' }}</td>
            </ng-container>

            <ng-container matColumnDef="rating">
                <th mat-header-cell *matHeaderCellDef>Rating</th>
                <td mat-cell *matCellDef="let p">
                    <span class="rating">
                        <mat-icon class="star">star</mat-icon>
                        {{ p.rating.rate }} ({{ p.rating.count }})
                    </span>
                </td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Acciones</th>
                <td mat-cell *matCellDef="let p">
                    <button mat-icon-button color="primary" (click)="openEdit(p)" matTooltip="Editar">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="delete(p)" matTooltip="Eliminar">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>
    </div>
    }

</div>
